services:


  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       cubestore
      POSTGRES_USER:     cubestore
      POSTGRES_PASSWORD: cubestore
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cubestore -d cubestore"]
      interval: 5s
      timeout: 5s
      retries: 10


  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10


  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://cubestore:cubestore@postgres:5432/cubestore
      DB_HOST:      postgres
      DB_PORT:      "5432"
      DB_USER:      cubestore
      REDIS_HOST:   redis
      REDIS_PORT:   "6379"
      PORT:         "3000"
      CORS_ORIGIN:  http://localhost:3001
    ports:
      - "3000:3000"


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NUXT_PUBLIC_API_BASE: http://localhost:3000/api
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      API_BASE_INTERNAL: http://backend:3000/api
      NUXT_PUBLIC_API_BASE: http://localhost:3000/api
    ports:
      - "3001:3000"

volumes:
  postgres_data:
